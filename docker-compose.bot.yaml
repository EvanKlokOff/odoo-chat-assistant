version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chat_analyzer_db
    environment:
      - POSTGRES_DB=chat_analyzer
      - POSTGRES_USER=analyzer
      - POSTGRES_PASSWORD=secure_password
    ports:
      - "5432:5432"  # Пробрасываем порт на хост
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d chat_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: