version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chat_analyzer_db
    environment:
      - POSTGRES_DB=chat_analyzer
      - POSTGRES_USER=analyzer
      - POSTGRES_PASSWORD=secure_password
    ports:
      - "5432:5432"  # Пробрасываем порт на хост
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U analyzer -d chat_analyzer" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chat-analyzer-redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis_db.conf:/usr/local/etc/redis_db/redis_db.conf:ro
    command: > 
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory-samples 5
      --active-expire-effort 2
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_MAXMEMORY=${REDIS_MAXMEMORY:-256mb}
      - REDIS_MAXMEMORY_POLICY=${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local